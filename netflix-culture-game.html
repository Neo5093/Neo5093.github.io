<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>文化变革大师：Netflix 高绩效实验室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #E50914;
            --primary-dark: #B20710;
            --primary-light: #FF4757;
            --secondary: #221F1F;
            --accent: #F5F5F1;
            --gold: #FFD700;
            --gold-light: #FFE66D;
            --success: #2ED573;
            --success-dark: #26AF61;
            --warning: #FFA502;
            --warning-light: #FFBE76;
            --danger: #FF4757;
            --purple: #A55EEA;
            --purple-light: #D6A4F5;
            --blue: #3742FA;
            --blue-light: #70A1FF;
            --cyan: #1DD1A1;
            --pink: #FF6B9D;
            --text: #2C3E50;
            --text-light: #7F8C8D;
            --card-bg: #fff;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(229, 9, 20, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(165, 94, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(29, 209, 161, 0.1) 0%, transparent 40%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 14s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; animation-duration: 16s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 1s; animation-duration: 13s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; animation-duration: 15s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; animation-duration: 11s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 2.5s; animation-duration: 17s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 4.5s; animation-duration: 14s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1.5s; animation-duration: 12s; }
        .particle:nth-child(10) { left: 15%; animation-delay: 3.5s; animation-duration: 18s; }
        .particle:nth-child(11) { left: 35%; animation-delay: 0.5s; animation-duration: 10s; }
        .particle:nth-child(12) { left: 55%; animation-delay: 2.5s; animation-duration: 19s; }
        .particle:nth-child(13) { left: 75%; animation-delay: 4.5s; animation-duration: 13s; }
        .particle:nth-child(14) { left: 85%; animation-delay: 1.5s; animation-duration: 16s; }
        .particle:nth-child(15) { left: 25%; animation-delay: 5.5s; animation-duration: 14s; }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(90vh) scale(1); }
            90% { opacity: 1; transform: translateY(10vh) scale(1); }
            100% { transform: translateY(0) scale(0); opacity: 0; }
        }

        /* Music Control Button */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 1000;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--purple) 0%, var(--purple-light) 100%);
        }

        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(165, 94, 234, 0.5);
        }

        .music-btn.playing {
            animation: musicPulse 1.5s ease-in-out infinite;
        }

        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(165, 94, 234, 0.5); }
            50% { box-shadow: 0 4px 25px rgba(165, 94, 234, 0.8), 0 0 30px rgba(165, 94, 234, 0.4); }
        }

        .game-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0;
            color: #fff;
            position: relative;
        }

        .header::before {
            content: '🎬';
            display: block;
            font-size: 4rem;
            margin-bottom: 10px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #fff 0%, var(--gold-light) 50%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            font-size: 1.3rem;
            opacity: 0.9;
            color: var(--cyan);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 140px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 25px;
            color: #fff;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.15);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--purple), var(--cyan));
        }

        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.3);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stat-card .label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 2.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stat-card.culture-index .value { 
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card.trust .value { 
            background: linear-gradient(135deg, var(--success) 0%, var(--cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card.time .value { 
            background: linear-gradient(135deg, var(--warning) 0%, var(--warning-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Main Content */
        .main-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 
                0 25px 80px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,255,255,0.1) inset;
            position: relative;
        }

        .main-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--purple), var(--cyan), var(--success), var(--warning));
        }

        /* Chapter Header */
        .chapter-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            padding: 25px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .chapter-number {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .chapter-info h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chapter-info p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        /* Scenario Content */
        .scenario-content {
            padding: 30px;
        }

        .scenario-title {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scenario-title::before {
            content: "📋";
        }

        .scenario-text {
            line-height: 1.8;
            color: var(--text);
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        /* Character */
        .character {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px;
            background: linear-gradient(135deg, #fef3e2 0%, #fff5e6 100%);
            border-radius: 12px;
            border: 1px solid #ffe0b2;
        }

        .character-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, #ff6b6b 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .character-info h4 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        .character-info p {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        /* Options */
        .options-container {
            margin-top: 25px;
        }

        .options-label {
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .option-btn {
            width: 100%;
            padding: 18px 22px;
            margin-bottom: 12px;
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
            font-size: 1rem;
            line-height: 1.6;
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
            transform: scaleY(0);
            transition: transform 0.3s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 5px 20px rgba(229,9,20,0.15);
            transform: translateX(5px);
        }

        .option-btn:hover::before {
            transform: scaleY(1);
        }

        .option-btn .option-letter {
            display: inline-block;
            width: 28px;
            height: 28px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            margin-right: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .option-btn .option-cost {
            float: right;
            font-size: 0.85rem;
            color: var(--warning);
            background: #fff8e1;
            padding: 2px 10px;
            border-radius: 20px;
        }

        /* Feedback Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.4s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--success) 0%, #2ecc71 100%);
            color: #fff;
            padding: 25px 30px;
            text-align: center;
        }

        .modal-header.good {
            background: linear-gradient(135deg, var(--success) 0%, #2ecc71 100%);
        }

        .modal-header.bad {
            background: linear-gradient(135deg, var(--danger) 0%, #c0392b 100%);
        }

        .modal-header.neutral {
            background: linear-gradient(135deg, var(--warning) 0%, #f39c12 100%);
        }

        .modal-header h3 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .modal-body {
            padding: 25px 30px;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat .label {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .result-stat .value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .result-stat .value.positive { color: var(--success); }
        .result-stat .value.negative { color: var(--danger); }

        /* Knowledge Card */
        .knowledge-card {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #90caf9;
        }

        .knowledge-card h4 {
            color: #1565c0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .knowledge-card p {
            color: #333;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .knowledge-card .quote {
            background: rgba(255,255,255,0.7);
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 12px;
            font-style: italic;
            border-left: 3px solid #1565c0;
        }

        /* Card Unlocked */
        .card-unlocked {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 2px solid var(--gold);
            text-align: center;
        }

        .card-unlocked h4 {
            color: #e65100;
            margin-bottom: 10px;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .modal-footer {
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(229,9,20,0.4);
        }

        /* Collection Panel */
        .collection-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--gold) 0%, #ffa000 100%);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            font-size: 1.5rem;
            transition: transform 0.3s;
            z-index: 100;
        }

        .collection-btn:hover {
            transform: scale(1.1);
        }

        .collection-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Collection Panel */
        .collection-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1001;
            padding: 20px;
            overflow-y: auto;
        }

        .collection-panel.active {
            display: block;
        }

        .collection-content {
            max-width: 800px;
            margin: 0 auto;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            color: #fff;
        }

        .collection-content h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--gold);
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .collection-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .collection-card.unlocked {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-color: var(--gold);
        }

        .collection-card .card-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .collection-card h5 {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #666;
        }

        .collection-card.unlocked h5 {
            color: #e65100;
        }

        .collection-card p {
            font-size: 0.75rem;
            color: #999;
        }

        .collection-card.unlocked p {
            color: #333;
        }

        .close-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }

        /* End Screen */
        .end-screen {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .end-screen.active {
            display: block;
        }

        .end-screen h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .end-screen .result-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .end-screen .final-score {
            font-size: 4rem;
            font-weight: bold;
            color: var(--gold);
            margin: 20px 0;
        }

        .end-screen .stars {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .end-screen .stars .star {
            color: #ddd;
        }

        .end-screen .stars .star.active {
            color: var(--gold);
        }

        .report-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
            text-align: left;
        }

        .report-section h4 {
            color: var(--primary);
            margin-bottom: 15px;
        }

        .report-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .report-item:last-child {
            border-bottom: none;
        }

        /* Start Screen */
        .start-screen {
            text-align: center;
            padding: 40px;
        }

        .start-screen h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .start-screen .intro {
            line-height: 1.8;
            color: var(--text);
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .start-screen .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .feature-item {
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
        }

        .feature-item .icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .stats-bar {
                flex-direction: column;
            }

            .stat-card {
                min-width: 100%;
            }

            .scenario-content {
                padding: 20px;
            }

            .start-screen .features {
                grid-template-columns: 1fr;
            }
        }

        /* Progress Bar */
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gold);
            border-radius: 10px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        // Music System using Web Audio API
        let audioContext = null;
        let isMusicPlaying = false;
        let musicInterval = null;
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }
        
        function playNote(frequency, duration, startTime) {
            const ctx = initAudio();
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.1, startTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
            
            oscillator.start(startTime);
            oscillator.stop(startTime + duration);
        }
        
        function playMelody() {
            const ctx = initAudio();
            const now = ctx.currentTime;
            
            // Simple pleasant melody notes (frequencies in Hz)
            const notes = [
                261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66,
                261.63, 293.66, 329.63, 392.00, 440.00, 392.00, 329.63, 293.66
            ];
            
            notes.forEach((freq, i) => {
                playNote(freq, 0.5, now + i * 0.4);
            });
        }
        
        function toggleMusic() {
            const btn = document.getElementById('musicBtn');
            
            if (isMusicPlaying) {
                // Stop music
                if (musicInterval) {
                    clearInterval(musicInterval);
                    musicInterval = null;
                }
                isMusicPlaying = false;
                btn.textContent = '🔇';
                btn.classList.remove('playing');
            } else {
                // Start music
                initAudio();
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                playMelody();
                musicInterval = setInterval(playMelody, 6500);
                isMusicPlaying = true;
                btn.textContent = '🎵';
                btn.classList.add('playing');
            }

        // Initialize Game
        function initGame() {
            updateUI();
            renderStartScreen();
        }

        function updateUI() {
            document.getElementById('cultureIndex').textContent = gameState.cultureIndex;
            document.getElementById('trustLevel').textContent = gameState.trustLevel;
            document.getElementById('timeLeft').textContent = gameState.timeLeft;
            document.getElementById('cardCount').textContent = gameState.unlockedCards.length;
        }

        function renderStartScreen() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="start-screen">
                    <h2>🎬 文化变革大师</h2>
                    <p style="font-size:1.2rem;color:#666;margin-bottom:20px;">Netflix 高绩效实验室</p>
                    <div class="intro">
                        <p>你是一家快速发展的科技公司"新浪潮科技"的新任CEO。公司正处在从初创期向规模化转型的关键节点，面临着人才流失、流程僵化、文化稀释等典型挑战。</p>
                        <p style="margin-top:15px;">你的任务是运用Netflix的高绩效管理智慧，带领公司完成文化变革，在有限的资源和时间内，通过正确的管理决策提升公司的"高绩效文化指数"。</p>
                    </div>
                    <div class="features">
                        <div class="feature-item">
                            <div class="icon">📊</div>
                            <h4>文化指数</h4>
                            <p>从50分开始，做出正确决策提升指数</p>
                        </div>
                        <div class="feature-item">
                            <div class="icon">🤝</div>
                            <h4>信任管理</h4>
                            <p>平衡短期效率与长期文化</p>
                        </div>
                        <div class="feature-item">
                            <div class="icon">⏰</div>
                            <h4>时间资源</h4>
                            <p>每个季度合理分配时间</p>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="startGame()">开始挑战</button>
                </div>
            `;
        }

        function startGame() {
            gameState.gamePhase = 'playing';
            gameState.currentChapter = 1;
            gameState.currentScenario = 0;
            gameState.choices = [];
            renderScenario();
        }

        function renderScenario() {
            const chapter = scenarios[gameState.currentChapter];
            const scenario = chapter.scenarios[gameState.currentScenario];
            const mainContent = document.getElementById('mainContent');

            // Calculate progress
            const totalScenarios = 12;
            const currentProgress = ((gameState.currentChapter - 1) * 4 + gameState.currentScenario) / totalScenarios * 100;

            mainContent.innerHTML = `
                <div class="chapter-header">
                    <div class="chapter-number">${gameState.currentChapter}</div>
                    <div class="chapter-info">
                        <h2>${chapter.title}</h2>
                        <p>${chapter.subtitle}</p>
                    </div>
                </div>
                <div class="scenario-content">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${currentProgress}%"></div>
                    </div>
                    <h3 class="scenario-title">${scenario.title}</h3>
                    <div class="scenario-text">${scenario.text}</div>
                    <div class="character">
                        <div class="character-avatar">${scenario.character.avatar}</div>
                        <div class="character-info">
                            <h4>${scenario.character.name}</h4>
                            <p>${scenario.character.role}</p>
                        </div>
                    </div>
                    <div class="options-container">
                        <div class="options-label">作为CEO，你的决策是：</div>
                        ${scenario.options.map((opt, idx) => `
                            <button class="option-btn" onclick="makeChoice(${idx})">
                                <span class="option-letter">${opt.letter}</span>
                                ${opt.text}
                                <span class="option-cost">⏱️ ${opt.cost}点</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function makeChoice(optionIndex) {
            const chapter = scenarios[gameState.currentChapter];
            const scenario = chapter.scenarios[gameState.currentScenario];
            const option = scenario.options[optionIndex];

            // Update state
            const oldCultureIndex = gameState.cultureIndex;
            const oldTrustLevel = gameState.trustLevel;
            
            gameState.cultureIndex = Math.max(0, Math.min(100, gameState.cultureIndex + option.cultureChange));
            gameState.trustLevel = Math.max(0, Math.min(100, gameState.trustLevel + option.trustChange));
            gameState.timeLeft = Math.max(0, gameState.timeLeft - option.cost);
            
            // Track choice
            gameState.choices.push({
                scenario: scenario.title,
                choice: option.letter,
                correct: option.cultureChange > 0
            });

            // Unlock card
            if (option.card && !gameState.unlockedCards.includes(option.card)) {
                gameState.unlockedCards.push(option.card);
            }

            // Show feedback
            showFeedback(option, oldCultureIndex, oldTrustLevel);
        }

        function showFeedback(option, oldCulture, oldTrust) {
            const modal = document.getElementById('feedbackModal');
            const header = document.getElementById('modalHeader');
            
            const cultureDiff = option.cultureChange;
            const trustDiff = option.trustChange;
            
            // Set header class
            header.className = 'modal-header';
            if (cultureDiff > 5) header.classList.add('good');
            else if (cultureDiff < 0) header.classList.add('bad');
            else header.classList.add('neutral');

            document.getElementById('feedbackTitle').textContent = cultureDiff > 0 ? '✓ 决策正确！' : cultureDiff < 0 ? '✗ 决策欠佳' : '○ 效果一般';
            document.getElementById('feedbackSubtitle').textContent = option.skillName;

            document.getElementById('cultureChange').textContent = (cultureDiff > 0 ? '+' : '') + cultureDiff;
            document.getElementById('cultureChange').className = 'value ' + (cultureDiff > 0 ? 'positive' : cultureDiff < 0 ? 'negative' : '');
            
            document.getElementById('trustChange').textContent = (trustDiff > 0 ? '+' : '') + trustDiff;
            document.getElementById('trustChange').className = 'value ' + (trustDiff > 0 ? 'positive' : trustDiff < 0 ? 'negative' : '');

            document.getElementById('feedbackText').textContent = option.feedback;

            // Show knowledge card
            const knowledgeCard = document.getElementById('knowledgeCard');
            if (option.knowledge) {
                knowledgeCard.style.display = 'block';
                document.getElementById('knowledgeText').textContent = option.knowledge;
                document.getElementById('knowledgeQuote').textContent = option.quote;
            } else {
                knowledgeCard.style.display = 'none';
            }

            // Show card unlocked
            const cardUnlocked = document.getElementById('cardUnlocked');
            if (option.card && gameState.unlockedCards.includes(option.card)) {
                cardUnlocked.style.display = 'block';
                const cardInfo = allCards[option.card];
                document.getElementById('unlockedCardName').textContent = `${cardInfo.icon} ${cardInfo.name}`;
            } else {
                cardUnlocked.style.display = 'none';
            }

            updateUI();
            modal.classList.add('active');
        }

        function nextStep() {
            document.getElementById('feedbackModal').classList.remove('active');
            
            // Move to next scenario
            gameState.currentScenario++;
            
            // Reset time for new scenario (every 4 scenarios = new quarter)
            if (gameState.currentScenario >= 4) {
                gameState.currentScenario = 0;
                gameState.currentChapter++;
                gameState.timeLeft = 10; // Reset time for new quarter
            }

            if (gameState.currentChapter > 3) {
                // Game end
                showEndScreen();
            } else {
                renderScenario();
            }
        }

        function showEndScreen() {
            gameState.gamePhase = 'end';
            const mainContent = document.getElementById('mainContent');
            
            const finalScore = gameState.cultureIndex;
            const stars = finalScore >= 96 ? 3 : finalScore >= 90 ? 2 : finalScore >= 80 ? 1 : 0;
            const result = finalScore >= 80 ? '成功' : '失败';
            const icon = finalScore >= 80 ? '🏆' : '💔';

            let reportHTML = '<div class="report-section"><h4>📋 变革报告</h4>';
            gameState.choices.forEach((choice, idx) => {
                const status = choice.correct ? '✓' : '✗';
                reportHTML += `<div class="report-item">${status} 第${Math.floor(idx/4)+1}章 - ${choice.scenario}: 选择选项${choice.choice}</div>`;
            });
            reportHTML += '</div>';

            mainContent.innerHTML = `
                <div class="end-screen active">
                    <div class="result-icon">${icon}</div>
                    <h2>${finalScore >= 80 ? '🎉 恭喜！' : '😢 抱歉！'} 文化变革${result}</h2>
                    <div class="final-score">${finalScore}</div>
                    <div class="stars">
                        ${[1,2,3].map(i => `<span class="star ${i <= stars ? 'active' : ''}">★</span>`).join('')}
                    </div>
                    <p>${finalScore >= 96 ? '卓越！您已成为真正的"文化变革大师"！' : 
                       finalScore >= 90 ? '优秀！您对Netflix文化的理解非常深入！' :
                       finalScore >= 80 ? '及格！您已掌握Netflix文化的核心要义。' :
                       '需要继续学习，尝试不同的决策路径。'}</p>
                    ${reportHTML}
                    <button class="btn-primary" onclick="restartGame()">🔄 重新挑战</button>
                </div>
            `;
        }

        function restartGame() {
            gameState.cultureIndex = 50;
            gameState.trustLevel = 50;
            gameState.timeLeft = 10;
            gameState.currentChapter = 1;
            gameState.currentScenario = 0;
            gameState.choices = [];
            // Keep unlocked cards for replay
            gameState.gamePhase = 'playing';
            renderScenario();
            updateUI();
        }

        function toggleCollection() {
            const panel = document.getElementById('collectionPanel');
            panel.classList.toggle('active');
            renderCollection();
        }

        function renderCollection() {
            const grid = document.getElementById('collectionGrid');
            grid.innerHTML = Object.entries(allCards).map(([key, card]) => `
                <div class="collection-card ${gameState.unlockedCards.includes(key) ? 'unlocked' : ''}">
                    <div class="card-icon">${card.icon}</div>
                    <h5>${card.name}</h5>
                    <p>${gameState.unlockedCards.includes(key) ? card.desc : '未解锁'}</p>
                </div>
            `).join('');
        }

        // Start the game
        initGame();
    </script>
</body>
</html>
