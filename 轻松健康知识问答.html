        }

        .logo {

            border-radius: 30px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 20px 60px rgba(0, 212, 170, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .home-page h1 {
            font-size: 36px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #00d4aa, #00a8cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .home-page .subtitle {
            font-size: 18px;
            color: #8892b0;
            margin-bottom: 40px;
        }

        .home-page .description {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            text-align: left;
        }

        .home-page .description h3 {
            color: #00d4aa;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .home-page .description ul {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .home-page .description li {
            padding: 10px 15px;
            background: rgba(0, 212, 170, 0.1);
            border-radius: 10px;
            font-size: 14px;
            border-left: 3px solid #00d4aa;
        }

        .start-btn {
            background: linear-gradient(135deg, #00d4aa, #00a8cc);
            color: #fff;
            border: none;
            padding: 18px 60px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 212, 170, 0.4);
            font-weight: bold;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 170, 0.5);
        }

        /* 游戏页面 */
        .game-page {
            display: none;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            height: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #00d4aa, #00a8cc);
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 35px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #00d4aa, #00a8cc);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #e6f1ff;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 18px 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option:hover {
            background: rgba(0, 212, 170, 0.1);
            border-color: #00d4aa;
            transform: translateX(5px);
        }

        .option.selected {
            background: rgba(0, 212, 170, 0.2);
            border-color: #00d4aa;
        }

        .option.correct {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
        }

        .option.wrong {
            background: rgba(255, 77, 77, 0.2);
            border-color: #ff4d4d;
        }

        .option-marker {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .option.selected .option-marker {
            background: #00d4aa;
        }

        .option.correct .option-marker {
            background: #00ff88;
        }

        .option.wrong .option-marker {
            background: #ff4d4d;
        }

        /* 结果页面 */
        .result-page {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 30px;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 8px;
            background: linear-gradient(135deg, #00d4aa, #00a8cc, #00d4aa);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .score-number {
            font-size: 60px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4aa, #00a8cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-label {
            font-size: 16px;
            color: #8892b0;
        }

        .result-title {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .result-description {
            color: #8892b0;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: rgba(0, 212, 170, 0.1);
            border-radius: 15px;
            padding: 20px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00d4aa;
        }

        .stat-label {
            font-size: 14px;
            color: #8892b0;
            margin-top: 5px;
        }

        .restart-btn {
            background: transparent;
            border: 2px solid #00d4aa;
            color: #00d4aa;
            padding: 15px 50px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 15px;
        }

        .restart-btn:hover {
            background: #00d4aa;
            color: #fff;
        }

        /* 分类选择 */
        .category-select {
            display: none;
            padding: 20px 0;
        }

        .category-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            color: #00d4aa;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .category-card:hover {
            background: rgba(0, 212, 170, 0.1);
            border-color: #00d4aa;
            transform: translateY(-5px);
        }

        .category-card.selected {
            background: rgba(0, 212, 170, 0.2);
            border-color: #00d4aa;
        }

        .category-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .category-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .category-count {
            font-size: 14px;
            color: #8892b0;
        }

        .category-btn {
            display: block;
            margin: 20px auto 0;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeIn 0.5s ease forwards;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .home-page .description ul {
                grid-template-columns: 1fr;
            }

            .category-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .question-text {
                font-size: 18px;
            }

            .option {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- 分类选择 -->

        <!-- 结果页面 -->

                <div class="stats">

                        <div class="stat-label">正确</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="wrongCount">0</div>
                        <div class="stat-label">错误</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">总计</div>
                    </div>
                </div>
            </div>
            <button class="restart-btn" onclick="restartGame()">再来一轮</button>
            <button class="start-btn" onclick="goHome()">返回首页</button>
        </div>
    </div>

                        options: ["让每个家庭都拥有应对疾病的勇气和力量", "让每个人都能买保险", "让每个人都能去医院", "让每个人都能买药"],

                        answer: 0
                    }
                ]
            }
        };

        // 游戏状态
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let selectedCategory = 'all';

        // 初始化分类选择
        function initCategorySelect() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = `
                <div class="category-card selected" data-category="all" onclick="selectCategory('all')">
                    <div class="category-icon">📚</div>
                    <div class="category-name">全部题目</div>
                    <div class="category-count">${Object.values(questionBank).reduce((sum, cat) => sum + cat.questions.length, 0)} 题</div>
                </div>
            `;

            for (const [key, category] of Object.entries(questionBank)) {
                grid.innerHTML += `
                    <div class="category-card" data-category="${key}" onclick="selectCategory('${key}')">
                        <div class="category-icon">${category.icon}</div>
                        <div class="category-name">${category.name}</div>
                        <div class="category-count">${category.questions.length} 题</div>
                    </div>
                `;
            }
        }

        function selectCategory(category) {
            selectedCategory = category;
            document.querySelectorAll('.category-card').forEach(card => {
                card.classList.remove('selected');
                if (card.dataset.category === category) {
                    card.classList.add('selected');
                }
            });
        }

        function showCategorySelect() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('categorySelect').style.display = 'block';
            initCategorySelect();
        }

        function startGame() {
            // 收集题目
            currentQuestions = [];
            if (selectedCategory === 'all') {
                for (const category of Object.values(questionBank)) {
                    currentQuestions.push(...category.questions);
                }
            } else {
                currentQuestions = [...questionBank[selectedCategory].questions];
            }

            // 随机打乱题目顺序
            currentQuestions = shuffleArray(currentQuestions);

            // 只取前10题
            currentQuestions = currentQuestions.slice(0, 10);

            currentIndex = 0;
            score = 0;
            correctCount = 0;
            wrongCount = 0;

            document.getElementById('categorySelect').style.display = 'none';
            document.getElementById('gamePage').style.display = 'block';

            showQuestion();
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function showQuestion() {
            const question = currentQuestions[currentIndex];

            document.getElementById('questionNumber').textContent = `第 ${currentIndex + 1} 题`;
            document.getElementById('questionText').textContent = question.question;

            const progress = ((currentIndex) / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;

            const optionsHtml = ['A', 'B', 'C', 'D'].map((letter, index) => `
                <div class="option" onclick="selectOption(${index})">
                    <span class="option-marker">${letter}</span>
                    <span>${question.options[index]}</span>
                </div>
            `).join('');

            document.getElementById('options').innerHTML = optionsHtml;
        }

        let selectedAnswer = null;

        function selectOption(index) {
            if (selectedAnswer !== null) return;

            selectedAnswer = index;
            const question = currentQuestions[currentIndex];
            const options = document.querySelectorAll('.option');

            options.forEach((option, i) => {
                if (i === question.answer) {
                    option.classList.add('correct');
                } else if (i === index && index !== question.answer) {
                    option.classList.add('wrong');
                }
                option.style.pointerEvents = 'none';
            });

            if (index === question.answer) {
                score += 10;
                correctCount++;
            } else {
                wrongCount++;
            }

            setTimeout(() => {
                currentIndex++;
                selectedAnswer = null;
                if (currentIndex < currentQuestions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1500);
        }

        function showResult() {
            document.getElementById('gamePage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'block';

            document.getElementById('scoreNumber').textContent = score;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            document.getElementById('totalCount').textContent = currentQuestions.length;

            const percentage = (score / (currentQuestions.length * 10)) * 100;
            let title, description;

            if (percentage >= 90) {
                title = "太棒了！你是专家！";
                description = "你对轻松健康集团的了解非常深入，已经是专家级别了！";
            } else if (percentage >= 70) {
                title = "做得很好！";
                description = "你对轻松健康集团的业务有了不错的了解，继续加油！";
            } else if (percentage >= 50) {
                title = "不错，继续努力！";
                description = "你对轻松健康集团有一定了解，还可以更深入学习一下。";
            } else {
                title = "再接再厉！";
                description = "别灰心！可以再学习一下轻松健康集团的相关知识。";
            }

            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultDescription').textContent = description;
        }

        function restartGame() {
            document.getElementById('resultPage').style.display = 'none';
            startGame();
        }

        function goHome() {
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('homePage').style.display = 'block';
        }
    </script>
</body>
</html>
