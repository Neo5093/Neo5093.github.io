<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>该影未来窗 | 每日资讯</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-glow: 0 4px 20px rgba(99, 102, 241, 0.25);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99, 102, 241, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 90% 90%, rgba(139, 92, 246, 0.06), transparent),
                radial-gradient(ellipse 50% 30% at 10% 70%, rgba(6, 182, 212, 0.05), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px 80px;
            position: relative;
            z-index: 1;
        }

        /* Banner */
        .banner {
            width: 100%;
            margin-bottom: 40px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.6s ease-out;
        }

        .banner img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        @media (max-width: 768px) {
            .banner {
                margin-bottom: 32px;
                border-radius: 16px;
            }
        }

        @media (max-width: 480px) {
            .banner {
                margin-bottom: 24px;
                border-radius: 12px;
            }
        }

        /* Hero */
        .hero { text-align: center; margin-bottom: 48px; }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 24px;
            animation: fadeInDown 0.6s ease-out;
        }

        .hero-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 16px;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .hero h1 span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Series Tabs */
        .series-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        .series-tab {
            flex: 1;
            padding: 20px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            box-shadow: var(--shadow-sm);
        }

        .series-tab:hover {
            background: var(--bg-card-hover);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .series-tab.active {
            background: var(--accent-gradient);
            border-color: transparent;
            box-shadow: var(--shadow-glow);
        }

        .series-tab.active .tab-name,
        .series-tab.active .tab-count { color: white; }

        .series-tab .tab-icon { font-size: 1.5rem; }

        .series-tab .tab-info { text-align: left; }

        .series-tab .tab-name {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .series-tab .tab-count {
            font-size: 0.8125rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Selector Card */
        .selector-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease-out 0.4s both;
            box-shadow: var(--shadow-md);
            position: relative;
            z-index: 10;
        }

        .selector-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .selector-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            box-shadow: var(--shadow-md);
            flex-shrink: 0;
        }

        .selector-title {
            font-size: 1rem;
            font-weight: 700;
        }

        .selector-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Calendar Picker */
        .calendar-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .calendar-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .calendar-nav {
            display: flex;
            gap: 6px;
        }

        .calendar-nav-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--text-secondary);
        }

        .calendar-nav-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .calendar-nav-btn svg {
            width: 14px;
            height: 14px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-weekday {
            text-align: center;
            font-size: 0.625rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 4px 0;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-primary);
            border: 1px solid transparent;
        }

        .calendar-day:hover:not(.empty):not(.disabled) {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.3);
            transform: scale(1.05);
        }

        .calendar-day.selected {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
            transform: scale(1.08);
        }

        .calendar-day.has-report {
            color: var(--text-primary);
            font-weight: 600;
        }

        .calendar-day.has-report::after {
            content: '';
            width: 3px;
            height: 3px;
            background: var(--accent-primary);
            border-radius: 50%;
            margin-top: 1px;
        }

        .calendar-day.selected.has-report::after {
            background: white;
        }

        .calendar-day.today {
            border: 2px solid var(--accent-primary);
        }

        .calendar-day.empty {
            cursor: default;
        }

        .calendar-day.disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .calendar-legend {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.625rem;
            color: var(--text-muted);
            padding-top: 6px;
            border-top: 1px solid var(--border-color);
        }

        .calendar-legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .calendar-legend-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        .calendar-legend-dot.report {
            background: var(--accent-primary);
        }

        .calendar-legend-dot.selected {
            background: var(--accent-gradient);
        }

        .calendar-selected-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(99, 102, 241, 0.06);
            border-radius: 10px;
            margin-top: 4px;
        }

        .calendar-selected-text {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .calendar-selected-text span {
            color: var(--accent-primary);
        }

        .go-btn {
            padding: 10px 20px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.8125rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .go-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .go-btn:active { transform: translateY(0); }

        .go-btn svg {
            width: 14px;
            height: 14px;
            transition: transform 0.3s ease;
        }

        .go-btn:hover svg {
            transform: translateX(4px);
        }

        /* Mobile adjustments for calendar footer */
        @media (max-width: 480px) {
            .calendar-selected-info {
                flex-direction: column;
                align-items: stretch;
                padding: 12px;
                gap: 10px;
            }
            .calendar-selected-text {
                font-size: 0.8125rem;
                text-align: center;
            }
            .go-btn {
                padding: 12px 20px;
                font-size: 0.875rem;
                justify-content: center;
                width: 100%;
            }
            .go-btn svg {
                width: 14px;
                height: 14px;
            }
        }

        /* Quick Access */
        .quick-access { 
            animation: fadeInUp 0.6s ease-out 0.5s both;
            position: relative;
            z-index: 1;
        }

        .quick-access-title {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .quick-link {
            padding: 24px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }

        .quick-link:hover {
            background: var(--bg-card-hover);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .quick-link .link-icon { font-size: 1.75rem; }

        .quick-link .link-text {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .quick-link:hover .link-text { color: var(--accent-primary); }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
            animation: fadeInUp 0.6s ease-out 0.6s both;
        }

        .footer-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #10b981;
            margin-bottom: 16px;
        }

        .footer-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        .footer p {
            font-size: 0.8125rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 40px 16px 60px; }
            .hero { margin-bottom: 40px; }
            .hero p { font-size: 1rem; }
            .series-tabs { gap: 8px; }
            .series-tab { padding: 16px 14px; gap: 10px; }
            .series-tab .tab-icon { font-size: 1.25rem; }
            .series-tab .tab-name { font-size: 0.8125rem; }
            .series-tab .tab-count { font-size: 0.75rem; }
            .selector-card { padding: 24px; }
            .dropdown-container { flex-direction: column; }
            .dropdown-trigger { padding: 16px 48px 16px 16px; }
            .go-btn { width: 100%; justify-content: center; }
            .quick-links { grid-template-columns: 1fr; gap: 12px; }
            .quick-link {
                flex-direction: row;
                justify-content: flex-start;
                padding: 16px 20px;
            }
        }

        @media (max-width: 480px) {
            .series-tabs { flex-direction: column; }
            .series-tab { justify-content: flex-start; }
            .selector-header { flex-direction: column; text-align: center; }
            .selector-icon { width: 56px; height: 56px; font-size: 1.75rem; }
            .selector-title { font-size: 1.125rem; }
        }

        @supports (padding: max(0px)) {
            .container {
                padding-left: max(24px, env(safe-area-inset-left));
                padding-right: max(24px, env(safe-area-inset-right));
                padding-bottom: max(80px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <section class="hero">
            <div class="hero-badge">每日资讯聚合</div>
            <h1>该影<span>未来窗</span></h1>
            <p>精选互联网、科技、财经资讯，每日更新</p>
        </section>

        <!-- Banner -->
        <div class="banner">
            <img src="Intelnet-daily-news/banner.jpg" alt="Banner">
        </div>



        <div class="selector-card">
            <div class="selector-header">
                <div class="selector-icon">📅</div>
                <div>
                    <div class="selector-title">选择日期阅读</div>
                    <div class="selector-subtitle">点击日期格进入阅读</div>
                </div>
            </div>

            <div class="calendar-wrapper">
                <div class="calendar-header">
                    <span class="calendar-title" id="calendarTitle">2026年3月</span>
                    <div class="calendar-nav">
                        <button class="calendar-nav-btn" onclick="prevMonth()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M15 18l-6-6 6-6"/>
                            </svg>
                        </button>
                        <button class="calendar-nav-btn" onclick="nextMonth()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 18l6-6-6-6"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="calendar-grid" id="calendarGrid">
                    <div class="calendar-weekday">日</div>
                    <div class="calendar-weekday">一</div>
                    <div class="calendar-weekday">二</div>
                    <div class="calendar-weekday">三</div>
                    <div class="calendar-weekday">四</div>
                    <div class="calendar-weekday">五</div>
                    <div class="calendar-weekday">六</div>
                </div>

                <div class="calendar-legend">
                    <div class="calendar-legend-item">
                        <span class="calendar-legend-dot report"></span>
                        <span>有日报</span>
                    </div>
                    <div class="calendar-legend-item">
                        <span class="calendar-legend-dot selected"></span>
                        <span>已选择</span>
                    </div>
                </div>

                <div class="calendar-selected-info">
                    <span class="calendar-selected-text">已选择：<span id="selectedDateText">2026年3月27日</span></span>
                    <button class="go-btn" onclick="goToDaily()">
                        前往阅读
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="quick-access">
            <div class="quick-access-title">快捷访问</div>
            <div class="quick-links">
                <a href="Intelnet-daily-news/互联网早报_2026年4月1日.html" class="quick-link">
                    <span class="link-icon">⚡</span>
                    <span class="link-text">最新一期</span>
                </a>
                <a href="Intelnet-daily-news/互联网早报_2026年3月31日.html" class="quick-link">
                    <span class="link-icon">📅</span>
                    <span class="link-text">昨日资讯</span>
                </a>
                <a href="Intelnet-daily-news/互联网早报_2026年3月25日.html" class="quick-link">
                    <span class="link-icon">📜</span>
                    <span class="link-text">往期回顾</span>
                </a>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-status">系统运行中</div>
            <p>自动更新于 2026-04-01</p>
            <p style="margin-top: 4px; opacity: 0.6;">Powered by OpenClaw Agent</p>
        </footer>
    </div>

    <script>
        // Available reports data
        const reports = [
            { date: 25, month: 2, year: 2026, url: 'Intelnet-daily-news/互联网早报_2026年3月25日.html', label: '2026年3月25日' },
            { date: 26, month: 2, year: 2026, url: 'Intelnet-daily-news/互联网早报_2026年3月26日.html', label: '2026年3月26日' },
            { date: 27, month: 2, year: 2026, url: 'Intelnet-daily-news/互联网早报_2026年3月27日.html', label: '2026年3月27日' },
            { date: 28, month: 2, year: 2026, url: 'Intelnet-daily-news/互联网早报_2026年3月28日.html', label: '2026年3月28日' },
            { date: 29, month: 2, year: 2026, url: 'Intelnet-daily-news/互联网早报_2026年3月29日.html', label: '2026年3月29日' },
            { date: 30, month: 2, year: 2026, url: 'Intelnet-daily-news/互联网早报_2026年3月30日.html', label: '2026年3月30日' },
            { date: 31, month: 2, year: 2026, url: 'Intelnet-daily-news/互联网早报_2026年3月31日.html', label: '2026年3月31日' },
            { date: 1, month: 3, year: 2026, url: 'Intelnet-daily-news/互联网早报_2026年4月1日.html', label: '2026年4月1日' }
        ];

        let selectedUrl = 'Intelnet-daily-news/互联网早报_2026年4月1日.html';
        let currentMonth = 2; // 0-indexed, 2 = March
        let currentYear = 2026;

        function getMonthName(month) {
            const names = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            return names[month];
        }

        function hasReport(year, month, date) {
            return reports.some(r => r.year === year && r.month === month && r.date === date);
        }

        function getReportUrl(year, month, date) {
            const report = reports.find(r => r.year === year && r.month === month && r.date === date);
            return report ? report.url : null;
        }

        function getReportLabel(year, month, date) {
            const report = reports.find(r => r.year === year && r.month === month && r.date === date);
            return report ? report.label : null;
        }

        function isToday(year, month, date) {
            const today = new Date();
            return today.getFullYear() === year && today.getMonth() === month && today.getDate() === date;
        }

        function isSelected(year, month, date) {
            const report = reports.find(r => r.year === year && r.month === month && r.date === date);
            if (!report) return false;
            return report.url === selectedUrl;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            
            // Keep weekday headers, clear days
            const weekdayHeaders = Array.from(grid.querySelectorAll('.calendar-weekday'));
            grid.innerHTML = '';
            weekdayHeaders.forEach(h => grid.appendChild(h));

            title.textContent = currentYear + '年' + getMonthName(currentMonth);

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day empty';
                grid.appendChild(empty);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                dayEl.textContent = d;

                if (hasReport(currentYear, currentMonth, d)) {
                    dayEl.classList.add('has-report');
                    dayEl.onclick = () => selectDate(d);
                    dayEl.tabIndex = 0;
                    dayEl.onkeydown = (e) => { if (e.key === 'Enter') selectDate(d); };
                } else {
                    dayEl.classList.add('disabled');
                }

                if (isToday(currentYear, currentMonth, d)) {
                    dayEl.classList.add('today');
                }

                if (isSelected(currentYear, currentMonth, d)) {
                    dayEl.classList.add('selected');
                }

                grid.appendChild(dayEl);
            }
        }

        function selectDate(date) {
            const url = getReportUrl(currentYear, currentMonth, date);
            const label = getReportLabel(currentYear, currentMonth, date);
            if (url && label) {
                selectedUrl = url;
                document.getElementById('selectedDateText').textContent = label;
                renderCalendar();
            }
        }

        function prevMonth() {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear--;
            } else {
                currentMonth--;
            }
            renderCalendar();
        }

        function nextMonth() {
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear++;
            } else {
                currentMonth++;
            }
            renderCalendar();
        }

        function goToDaily() {
            if (selectedUrl) {
                window.location.href = selectedUrl;
            }
        }

        renderCalendar();
    </script>
</body>
</html>
