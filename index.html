<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>该影未来窗 | 每日资讯</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #1E3A5F;
            --color-primary-light: #2D5A87;
            --color-accent: #F59E0B;
            --color-bg-primary: #FAFBFC;
            --color-bg-secondary: #FFFFFF;
            --color-text-primary: #111827;
            --color-text-secondary: #4B5563;
            --color-border: #E5E7EB;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-lg: 12px;
            --radius-full: 9999px;
            --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        [data-theme="dark"] {
            --color-bg-primary: #0A0A0F;
            --color-bg-secondary: #141419;
            --color-text-primary: #F9FAFB;
            --color-text-secondary: #D1D5DB;
            --color-border: #374151;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 0.5rem;
        }
        .header p {
            color: var(--color-text-secondary);
            font-size: 0.875rem;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--color-bg-secondary);
            padding: 0.25rem;
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-md);
        }
        .tab {
            padding: 0.75rem 1.5rem;
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--color-primary);
            color: white;
        }
        .panel {
            display: none;
            width: 100%;
            max-width: 400px;
        }
        .panel.active {
            display: block;
        }
        .card {
            background: var(--color-bg-secondary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 1.5rem;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: var(--color-bg-primary);
            border-radius: 8px;
            text-decoration: none;
            color: var(--color-text-primary);
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .link-item:hover {
            background: var(--color-primary);
            color: white;
            transform: translateX(4px);
        }
        .link-item .badge {
            font-size: 0.75rem;
            padding: 0.125rem 0.5rem;
            background: var(--color-accent);
            color: white;
            border-radius: var(--radius-full);
        }
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border: none;
            background: var(--color-bg-secondary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            font-size: 1.25rem;
        }
        .quick-access {
            margin-top: 1.5rem;
            max-width: 400px;
        }
        .quick-title {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            margin-bottom: 0.75rem;
        }
        .quick-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .quick-link {
            padding: 0.5rem 1rem;
            background: var(--color-bg-secondary);
            border-radius: var(--radius-full);
            text-decoration: none;
            color: var(--color-primary);
            font-size: 0.75rem;
            font-weight: 500;
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>

    <script>
        function showPanel(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`[onclick="showPanel('${name}')"]`).classList.add('active');
            document.getElementById('panel-' + name).classList.add('active');
        }
    </script>
